<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Aki</title>
<meta name="description" content="Aki — links.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Shippori+Mincho:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --sumi:#0c0a09;        /* тушь */
    --sumi-2:#15120f;
    --kin:#c9a227;         /* золото */
    --kin-soft:#e3c77a;
    --shu:#b23a2e;         /* киноварь */
    --washi:#e8e2d6;       /* бумага */
    --muted:#8a8072;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    min-height:100svh;
    background:
      radial-gradient(120% 80% at 50% -10%, #241d16 0%, transparent 60%),
      linear-gradient(180deg,var(--sumi-2),var(--sumi));
    color:var(--washi);
    font-family:"Cormorant Garamond",Georgia,serif;
    display:grid;place-items:center;
    padding:48px 20px;
    position:relative;overflow-x:hidden;
  }
  /* фактура васи */
  body::after{
    content:"";position:fixed;inset:0;pointer-events:none;opacity:.05;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='n'><feTurbulence baseFrequency='.85' numOctaves='3'/></filter><rect width='140' height='140' filter='url(%23n)'/></svg>");
  }
  /* вертикальный кандзи сбоку */
  .kanji{
    position:fixed;top:50%;right:3vw;transform:translateY(-50%);
    font-family:"Shippori Mincho",serif;font-size:clamp(72px,14vw,180px);
    color:transparent;-webkit-text-stroke:1px rgba(201,162,39,.18);
    writing-mode:vertical-rl;letter-spacing:.2em;user-select:none;pointer-events:none;
  }
  main{width:100%;max-width:400px;text-align:center;position:relative;z-index:1}

  .seal{ /* ханко */
    width:44px;height:44px;margin:0 auto 26px;border-radius:6px;
    background:var(--shu);display:grid;place-items:center;
    font-family:"Shippori Mincho",serif;font-size:22px;color:#f3e6d8;
    box-shadow:0 0 0 1px rgba(255,255,255,.08),0 8px 30px rgba(178,58,46,.25);
  }
  .avatar{
    width:132px;height:132px;border-radius:50%;object-fit:cover;
    border:1px solid rgba(201,162,39,.35);
    box-shadow:0 0 0 6px rgba(201,162,39,.05),0 20px 60px rgba(0,0,0,.6);
    filter:grayscale(.15) contrast(1.05);
  }
  h1{
    margin:24px 0 6px;font-weight:300;font-size:46px;letter-spacing:.28em;
    text-indent:.28em;
    background:linear-gradient(180deg,#fff8ec,var(--kin-soft) 55%,#9c7c22);
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .tagline{
    font-family:"Shippori Mincho",serif;font-size:12px;letter-spacing:.34em;
    text-transform:uppercase;color:var(--muted);
  }
  .rule{
    width:56px;height:1px;margin:26px auto 30px;
    background:linear-gradient(90deg,transparent,var(--kin),transparent);
  }

  /* лента фоток */
  .strip{
    display:flex;gap:10px;overflow-x:auto;scroll-snap-type:x mandatory;
    margin:0 -20px 30px;padding:0 20px 12px;
    scrollbar-width:none;
  }
  .strip::-webkit-scrollbar{display:none}
  .strip img{
    flex:none;width:132px;height:186px;object-fit:cover;scroll-snap-align:center;
    border:1px solid rgba(201,162,39,.22);
    filter:grayscale(.25) contrast(1.05) brightness(.92);
    transition:.4s cubic-bezier(.2,.7,.3,1);
  }
  .strip img:hover{filter:none;border-color:rgba(201,162,39,.6);transform:translateY(-3px)}

  a.link{
    display:flex;align-items:center;gap:14px;
    padding:16px 18px;margin-bottom:12px;
    border:1px solid rgba(232,226,214,.09);
    background:linear-gradient(180deg,rgba(255,255,255,.035),rgba(255,255,255,.01));
    color:var(--washi);text-decoration:none;
    letter-spacing:.16em;text-transform:uppercase;font-size:13px;
    transition:.35s cubic-bezier(.2,.7,.3,1);
  }
  a.link svg{width:18px;height:18px;flex:none;fill:var(--kin);transition:.35s}
  a.link .label{flex:1;text-align:left}
  a.link .jp{font-family:"Shippori Mincho",serif;font-size:11px;color:var(--muted);letter-spacing:.1em;transition:.35s}
  a.link:hover{
    border-color:rgba(201,162,39,.55);
    background:linear-gradient(180deg,rgba(201,162,39,.10),rgba(201,162,39,.02));
    transform:translateY(-2px);
    box-shadow:0 12px 34px rgba(0,0,0,.5);
  }
  a.link:hover svg{fill:var(--kin-soft)}
  a.link:hover .jp{color:var(--kin)}
  a.link:focus-visible{outline:1px solid var(--kin);outline-offset:3px}

  footer{margin-top:34px;font-size:11px;letter-spacing:.3em;color:#4d463d;text-transform:uppercase}
</style>
</head>
